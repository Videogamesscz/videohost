    <style type="text/css">
        /* Estilos base compatibles con PS3 */
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* BANNER */
        .banner-container {
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #000000;
            border-bottom: 4px solid #aeea00;
        }
        
        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
            border: none;
        }

        .container {
            width: 95%;
            margin: 20px auto;
        }

        /* MENU DE CATEGORIAS (100% del ancho) */
        table.categorias-menu {
            width: 100%;
            border-collapse: separate;
            border-spacing: 10px;
            margin-bottom: 30px;
        }

        .icono-cat {
            display: block;
            background-color: #ffffff;
            border: 2px solid #e0e0e0;
            padding: 15px 5px;
            color: #666666;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
        }

        .icono-cat img {
            display: block;
            margin: 0 auto 10px auto;
            width: 64px;
            height: 64px;
            border: none;
        }

        .icono-cat.activo {
            border-color: #aeea00;
            color: #333333;
            background-color: #f4fce8;
        }

        /* GRID DE DESCARGAS */
        .grid-descargas {
            text-align: center;
        }

        .item-descarga {
            display: inline-block;
            width: 120px;
            margin: 15px 20px;
            vertical-align: top;
            text-align: center;
            display: none; /* Oculto hasta que el script actúa */
        }

        .item-descarga a {
            text-decoration: none;
            color: #333333;
            display: block;
            outline: none;
        }

        .item-descarga img {
            width: 80px;
            height: 80px;
            border: 3px solid transparent;
            border-radius: 15px; 
            margin-bottom: 8px;
        }

        .item-descarga a:hover img {
            border-color: #aeea00;
            background-color: #f4fce8;
        }

        .item-descarga span {
            display: block;
            font-size: 14px;
            font-weight: bold;
        }
    </style>

    <script type="text/javascript">
        function filtrar(categoria) {
            var botones = ['hen', 'cfw', 'aplicaciones', 'multimedia', 'utilidades'];
            
            for (var i = 0; i < botones.length; i++) {
                document.getElementById('btn-' + botones[i]).className = 'icono-cat';
            }
            document.getElementById('btn-' + categoria).className = 'icono-cat activo';

            var contenedor = document.getElementById('contenedor-tarjetas');
            var tarjetas = contenedor.getElementsByTagName('div');

            for (var j = 0; j < tarjetas.length; j++) {
                var tarjeta = tarjetas[j];
                if (tarjeta.className.indexOf('item-descarga') !== -1) {
                    var catTarjeta = tarjeta.getAttribute('data-categoria');
                    if (categoria === catTarjeta) {
                        tarjeta.style.display = 'inline-block';
                    } else {
                        tarjeta.style.display = 'none';
                    }
                }
            }
        }

        window.onload = function() {
            filtrar('hen');
        };
